name: Build APK + TV Assets

on:
  workflow_dispatch:
    inputs:
      # ── Inputs enviados pelo painel (não remover) ──
      app_name:
        description: 'Nome do app'
        required: false
        default: 'SimanPlay'
      reseller_username:
        description: 'Username do revendedor'
        required: false
        default: ''
      app_subtitle:
        description: 'Subtítulo do app'
        required: false
        default: 'Conecte sua lista'
      background_color:
        description: 'Cor de fundo hex'
        required: false
        default: '0d0d1a'
      surface_color:
        description: 'Cor de superfície hex'
        required: false
        default: '1a1a2e'
      app_theme:
        description: 'Tema do app (primary color hex)'
        required: false
        default: 'FF6B35'
      banner_url:
        description: 'URL do banner do revendedor'
        required: false
        default: ''
      # ── Inputs adicionais ──
      logo_url:
        description: 'URL do logo do revendedor'
        required: false
        default: ''
      primary_color:
        description: 'Cor principal hex (fallback se app_theme vazio)'
        required: false
        default: 'FF6B35'
      bg_color:
        description: 'Cor fundo hex (fallback se background_color vazio)'
        required: false
        default: '0d0d1a'
      reseller_id:
        description: 'ID do revendedor'
        required: false
        default: ''
      api_url:
        description: 'URL da API do backend'
        required: false
        default: 'https://simanplay-backend.up.railway.app'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # 1. Checkout do código
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Configurar Java
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3. Configurar Flutter
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.2'
          channel: 'stable'
          cache: true

      # 4. Instalar dependências Python para geração de assets
      - name: Install Python deps
        run: pip install Pillow requests

      # 5. Gerar app_config.dart com dados do revendedor
      - name: Generate app_config.dart
        env:
          APP_NAME: ${{ github.event.inputs.app_name }}
          APP_SUBTITLE: ${{ github.event.inputs.app_subtitle }}
          PRIMARY_COLOR: ${{ github.event.inputs.app_theme || github.event.inputs.primary_color }}
          BG_COLOR: ${{ github.event.inputs.background_color || github.event.inputs.bg_color }}
          SURFACE_COLOR: ${{ github.event.inputs.surface_color }}
          BANNER_URL: ${{ github.event.inputs.banner_url }}
          LOGO_URL: ${{ github.event.inputs.logo_url }}
          API_URL: ${{ github.event.inputs.api_url }}
          RESELLER_ID: ${{ github.event.inputs.reseller_id }}
          RESELLER_USERNAME: ${{ github.event.inputs.reseller_username }}
        run: |
          python3 scripts/generate_app_config.py

      # 6. Gerar banner Android TV + ícones Roku com logo do revendedor
      - name: Generate TV assets (banner + Roku icons)
        env:
          APP_NAME: ${{ github.event.inputs.app_name }}
          APP_LOGO_URL: ${{ github.event.inputs.logo_url || github.event.inputs.banner_url }}
          PRIMARY_COLOR: "#${{ github.event.inputs.app_theme || github.event.inputs.primary_color }}"
          BG_COLOR: "#${{ github.event.inputs.background_color || github.event.inputs.bg_color }}"
        run: |
          python3 scripts/generate_tv_assets.py

      # 7. Gerar manifest Roku
      - name: Generate Roku manifest
        env:
          APP_NAME: ${{ github.event.inputs.app_name }}
        run: |
          python3 scripts/generate_roku_manifest.py

      # 8. Empacotar canal Roku (.zip)
      - name: Package Roku channel
        run: |
          cd roku_channel
          zip -r ../simanplay_roku_channel.zip .
          cd ..
          echo "✅ Roku channel empacotado"

      # 9. Instalar pacotes Flutter
      - name: Flutter pub get
        run: flutter pub get

      # 10. Build APK Android
      - name: Build APK
        run: flutter build apk --release

      # 11. Renomear APK com nome do revendedor
      - name: Rename APK
        run: |
          APP_SLUG=$(echo "${{ github.event.inputs.app_name }}" | tr ' ' '_' | tr '[:upper:]' '[:lower:]')
          mv build/flutter/outputs/flutter-apk/app-release.apk ${APP_SLUG}.apk || \
          mv build/app/outputs/flutter-apk/app-release.apk ${APP_SLUG}.apk
          echo "APK_NAME=${APP_SLUG}.apk" >> $GITHUB_ENV

      # 12. Upload dos artefatos
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-APK
          path: "*.apk"
          retention-days: 7

      - name: Upload Roku Channel
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.app_name }}-Roku
          path: simanplay_roku_channel.zip
          retention-days: 7

      # 13. Notificar Railway com APK e Roku prontos
      - name: Notify backend
        if: ${{ github.event.inputs.reseller_id != '' }}
        env:
          RESELLER_ID: ${{ github.event.inputs.reseller_id }}
          API_URL: ${{ github.event.inputs.api_url }}
          APP_NAME: ${{ github.event.inputs.app_name }}
        run: |
          APK_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "${API_URL}/api/builds/complete" \
            -H "Content-Type: application/json" \
            -d "{\"resellerId\": \"${RESELLER_ID}\", \"status\": \"success\", \"downloadUrl\": \"${APK_URL}\", \"appName\": \"${APP_NAME}\"}" \
            || echo "Notificação ignorada (endpoint opcional)"
