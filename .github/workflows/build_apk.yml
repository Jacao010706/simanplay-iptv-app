name: Build APK White-label

on:
  workflow_dispatch:
    inputs:
      reseller_id:
        description: 'ID do revendedor'
        required: true
      reseller_username:
        description: 'Username do revendedor'
        required: true
      app_name:
        description: 'Nome do app'
        required: true
        default: 'SimanPlay IPTV'
      app_subtitle:
        description: 'Subtitulo do app'
        required: false
        default: 'Conecte sua lista'
      primary_color:
        description: 'Cor primaria hex (ex: #e94bff)'
        required: true
        default: '#e94bff'
      background_color:
        description: 'Cor de fundo hex'
        required: true
        default: '#0d0b14'
      surface_color:
        description: 'Cor de superficie hex'
        required: true
        default: '#1a1625'
      app_theme:
        description: 'Tema do app (1-6)'
        required: true
        default: '1'
      logo_url:
        description: 'URL da logo (opcional)'
        required: false
        default: ''
      banner_url:
        description: 'URL do banner (opcional)'
        required: false
        default: ''

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.5'
          channel: 'stable'

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Convert color to int
        id: colors
        run: |
          primary=$(echo "${{ inputs.primary_color }}" | sed 's/#//')
          background=$(echo "${{ inputs.background_color }}" | sed 's/#//')
          surface=$(echo "${{ inputs.surface_color }}" | sed 's/#//')
          echo "primary=0xFF${primary}" >> $GITHUB_OUTPUT
          echo "background=0xFF${background}" >> $GITHUB_OUTPUT
          echo "surface=0xFF${surface}" >> $GITHUB_OUTPUT

      - name: Update AppConfig
        run: |
          sed -i "s/static const String appName = .*/static const String appName = '${{ inputs.app_name }}';/" lib/core/app_config.dart
          sed -i "s/static const String appSubtitle = .*/static const String appSubtitle = '${{ inputs.app_subtitle }}';/" lib/core/app_config.dart
          sed -i "s/static const int primaryColor = .*/static const int primaryColor = ${{ steps.colors.outputs.primary }};/" lib/core/app_config.dart
          sed -i "s/static const int backgroundColor = .*/static const int backgroundColor = ${{ steps.colors.outputs.background }};/" lib/core/app_config.dart
          sed -i "s/static const int surfaceColor = .*/static const int surfaceColor = ${{ steps.colors.outputs.surface }};/" lib/core/app_config.dart
          sed -i "s/static const bool useCustomLogo = .*/static const bool useCustomLogo = ${{ inputs.logo_url != '' }};/" lib/core/app_config.dart
          sed -i "s/static const int appTheme = .*/static const int appTheme = ${{ inputs.app_theme }};/" lib/core/app_config.dart
          cat lib/core/app_config.dart
      - name: Download Logo
        if: ${{ inputs.logo_url != '' }}
        run: |
          mkdir -p assets
          curl -L "${{ inputs.logo_url }}" -o assets/logo.png || true

      - name: Update app name in AndroidManifest
        run: |
          sed -i 's/android:label="[^"]*"/android:label="${{ inputs.app_name }}"/' android/app/src/main/AndroidManifest.xml

      - name: Get dependencies
        run: flutter pub get

      - name: Decode Keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/simanplay.jks
          printf 'storePassword=${{ secrets.KEYSTORE_PASSWORD }}\nkeyPassword=${{ secrets.KEYSTORE_PASSWORD }}\nkeyAlias=${{ secrets.KEY_ALIAS }}\nstoreFile=simanplay.jks\n' > android/key.properties
          cat android/key.properties

      - name: Build APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Rename APK
        run: |
          mkdir -p release
          cp build/app/outputs/flutter-apk/app-release.apk release/${{ inputs.reseller_username }}-simanplay.apk || \
          cp build/flutter_apk/app-release.apk release/${{ inputs.reseller_username }}-simanplay.apk || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ inputs.reseller_username }}-${{ github.run_number }}
          name: APK ${{ inputs.app_name }} - ${{ inputs.reseller_username }}
          files: release/${{ inputs.reseller_username }}-simanplay.apk
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Notify backend - Success
        if: success()
        run: |
          APK_URL="https://github.com/Jacao010706/simanplay-iptv-app/releases/download/apk-${{ inputs.reseller_username }}-${{ github.run_number }}/${{ inputs.reseller_username }}-simanplay.apk"
          curl -X PATCH "${{ secrets.BACKEND_URL }}/resellers/${{ inputs.reseller_id }}/whitelabel/status?status=ready&apk_url=${APK_URL}" || true

      - name: Notify backend - Failure
        if: failure()
        run: |
          curl -X PATCH "${{ secrets.BACKEND_URL }}/resellers/${{ inputs.reseller_id }}/whitelabel/status?status=error" || true
