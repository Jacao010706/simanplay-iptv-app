name: simanplay_iptv
description: "Siman Play IPTV - Assistente de Streaming"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Video
  media_kit: ^1.2.6
  media_kit_video: ^2.0.1
  media_kit_libs_video: any

  # Network
  http: ^1.5.0
  dio: ^5.7.0

  # Storage
  shared_preferences: ^2.5.3
  path_provider: ^2.1.4

  # State
  provider: ^6.1.2

  # Utils
  xml: ^6.5.0
  network_info_plus: ^7.0.0
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
